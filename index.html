<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Projects</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f8;
      text-align: center;
      margin: 0;
      padding: 40px;
    }

    h1 {
      margin-bottom: 30px;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-decoration: none;
      color: black;
      width: 200px;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    .card h2 {
      margin-top: 0;
    }
  </style>
</head>
<body>

  <h1>Tillgängliga projekt</h1>

  <div class="container">
    <a class="card" href="match-card/index.html">
      <h2>Matchkort</h2>
      <p>Skapa bilder för sociala medier</p>
    </a>

    <a class="card" href="stats-keeper/index.html">
      <h2>Statistikloggare</h2>
      <p>För statistik under match och exportera för analys</p>
    </a>
    
    <a class="card" href="schema-planerare/index.html">
      <h2>Föreningsscheman</h2>
      <p>Scheman för träning, match och cup</p>
    </a>

    <a class="card" href="ref-quiz/index.html">
      <h2>Quiz – Fotbollsregler</h2>
      <p>Spelregler för barn- och ungdomsfotboll i quizformat</p>
    </a>
  </div>

</body>
</html>
